<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Professional</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --cell: #2a2a2a;
            --cell-hover: #3a3a3a;
            --accent: #00ff88;
            --grid-size: clamp(280px, 85vw, 400px);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-header { text-align: center; margin-bottom: 15px; z-index: 10; width: 90%; }
        .game-header h1 { margin: 0; font-size: clamp(1.5rem, 8vw, 2.5rem); letter-spacing: 2px; color: var(--accent); }
        .instruction { color: #888; font-size: clamp(0.75rem, 3vw, 0.9rem); }

        .dashboard {
            background: var(--panel);
            width: var(--grid-size);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-radius: 10px 10px 0 0;
            border: 2px solid #333;
            border-bottom: none;
            box-sizing: border-box;
        }

        .stat-box {
            background: #000;
            color: #ff0044;
            padding: 5px 10px;
            border: 1px solid #444;
            font-family: 'Courier New', monospace;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background: #333;
            padding: 8px;
            width: var(--grid-size);
            height: var(--grid-size);
            border: 2px solid #333;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 10;
            box-sizing: border-box;
        }

        .cell {
            background: var(--cell);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: clamp(1rem, 5vw, 1.5rem);
            transition: background 0.1s;
            user-select: none;
        }

        .cell:active { background: var(--cell-hover); transform: scale(0.95); }
        .cell.revealed { background: #111; cursor: default; border: 1px solid #222; }

        @keyframes rainbow-bg {
            0% { background: #ff00ff; }
            20% { background: #00ffff; }
            40% { background: #ffff00; }
            60% { background: #00ff00; }
            80% { background: #ff0000; }
            100% { background: #ff00ff; }
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(8px, 8px) rotate(2deg); }
            50% { transform: translate(-8px, -8px) rotate(-2deg); }
            75% { transform: translate(8px, -8px) rotate(2deg); }
            100% { transform: translate(0,0); }
        }

        @keyframes zoom-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .prank-mode {
            animation: rainbow-bg 0.1s infinite, shake 0.05s infinite, zoom-pulse 0.4s infinite !important;
        }

        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            border: 8px solid #fff;
            text-align: center;
            z-index: 1000;
            display: none;
            opacity: 0;
            width: 85%;
            max-width: 400px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            animation: neon-border 0.8s infinite alternate;
        }

        @keyframes neon-border {
            from { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
            to { border-color: #00ffff; box-shadow: 0 0 60px #00ffff; }
        }

        .rainbow-text {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: 900;
            background: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 400% 400%;
            animation: move-gradient 1s linear infinite;
        }

        @keyframes move-gradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .disco-ball { font-size: 70px; display: block; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .emoji-pulse { display: inline-block; animation: pulse 0.3s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.6); } 100% { transform: scale(1); } }

        .btns { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button {
            width: 100%;
            max-width: 180px;
            padding: 12px 0;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-again { background: #00ff88; color: #000; }
        .btn-close { background: #ff3366; color: #fff; }

        @media (min-width: 600px) {
            .btns { flex-direction: row; justify-content: center; }
        }

        .particle { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; }
        .bg-circle { position: fixed; border-radius: 50%; z-index: 1; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="game-header">
        <h1>Minesweeper</h1>
        <div class="instruction">Find all the safe tiles!</div>
    </div>

    <div class="dashboard">
        <div class="stat-box" id="mine-display">💣 010</div>
        <div class="stat-box" id="timer-display">00:00</div>
    </div>
    <div class="grid" id="grid"></div>

    <div id="popup">
        <span class="disco-ball">🪩</span>
        <div class="rainbow-text">CONGRATULATIONS!!!!</div>
        <div class="btns">
            <button class="btn-again" onclick="resetGame()">Again</button>
            <button class="btn-close" onclick="stopPrank()">Close</button>
        </div>
    </div>

    <audio id="audioDisco" src="Music/Caramelldansen SpeedyCake Remix.mp3" loop></audio>

    <script>
        const grid = document.getElementById('grid');
        const popup = document.getElementById('popup');
        const audioDisco = document.getElementById('audioDisco');
        const timerDisplay = document.getElementById('timer-display');
        
        let clicks = 0;
        let triggerAt = Math.floor(Math.random() * 3) + 7;
        let isPrankActive = false;
        let timerSeconds = 0;
        let timerInterval;
        let effectIntervals = [];

        const safeEmojis = ['💎', '✨', '✅', '🍀', '🌟', '🛡️', '💠', '🔹'];

        function initGrid() {
            grid.innerHTML = '';
            clicks = 0;
            triggerAt = Math.floor(Math.random() * 3) + 7;
            isPrankActive = false;
            
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.addEventListener('pointerdown', () => handleCellClick(cell));
                grid.appendChild(cell);
            }
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerSeconds = 0;
            timerInterval = setInterval(() => {
                timerSeconds++;
                const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const s = (timerSeconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${m}:${s}`;
            }, 1000);
        }

        function handleCellClick(cell) {
            if (isPrankActive || cell.classList.contains('revealed')) return;

            clicks++;
            cell.classList.add('revealed');
            cell.innerText = safeEmojis[Math.floor(Math.random() * safeEmojis.length)];

            if (clicks >= triggerAt) {
                triggerPrank();
            }
        }

        function triggerPrank() {
            isPrankActive = true;
            clearInterval(timerInterval);
            
            // Jump to 00:50 and Play
            audioDisco.currentTime = 50; 
            audioDisco.play().catch(e => console.log("Interaction required for audio"));

            document.body.classList.add('prank-mode');
            startVisualChaos();

            setTimeout(() => {
                popup.classList.add('active');
            }, 300);
        }

        function startVisualChaos() {
            const isMobile = window.innerWidth < 600;
            effectIntervals.push(setInterval(createBgCircle, isMobile ? 300 : 150));
            effectIntervals.push(setInterval(createFirework, isMobile ? 700 : 400));
        }

        function createBgCircle() {
            if (!isPrankActive) return;
            const circle = document.createElement('div');
            circle.className = 'bg-circle';
            const size = Math.random() * (window.innerWidth * 0.4) + 60;
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.left = Math.random() * 100 + 'vw';
            circle.style.top = '110vh';
            circle.style.background = `hsla(${Math.random() * 360}, 100%, 50%, 0.6)`;
            document.body.appendChild(circle);

            circle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0.8 },
                { transform: 'translateY(-120vh) scale(2.5)', opacity: 0 }
            ], { duration: 1800, easing: 'linear' }).onfinish = () => circle.remove();
        }

        function createFirework() {
            if (!isPrankActive) return;
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#00ff00'];
            
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = '12px';
                p.style.height = '12px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                document.body.appendChild(p);

                const angle = (Math.PI * 2 / 12) * i;
                const dist = Math.random() * 120 + 60;
                
                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(0)`, opacity: 0 }
                ], { duration: 600, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function resetGame() {
            stopPrank();
            initGrid();
        }

        function stopPrank() {
            isPrankActive = false;
            document.body.classList.remove('prank-mode');
            popup.classList.remove('active');
            audioDisco.pause();
            audioDisco.currentTime = 0;
            effectIntervals.forEach(clearInterval);
            effectIntervals = [];
            document.querySelectorAll('.bg-circle, .particle').forEach(el => el.remove());
        }

        initGrid();
    </script>
</body>
</html>
